<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CVX — Chevron DCF Valuation</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
/* Paste all your existing CSS here */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
/* ... keep your entire CSS from before ... */
</style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <div class="nav-brand">CVX <span>/</span> Chevron</div>
  <div class="nav-links">
    <button class="nl on" onclick="show('cover',this)">Overview</button>
    <button class="nl" onclick="show('fin',this)">Financials</button>
    <button class="nl" onclick="show('dcf',this)">DCF</button>
    <button class="nl" onclick="show('wacc',this)">WACC</button>
    <button class="nl" onclick="show('scen',this)">Scenarios</button>
    <button class="nl" onclick="show('calc',this)">Calculator</button>
  </div>
  <a class="nav-pdf" href="CVX_Report_Final_v2.pdf" download target="_blank">Download PDF Report</a>
  <a class="nav-pdf" href="CVX_Model.xlsx" download target="_blank">Download Excel Model</a>
</nav>

<!-- TABS -->
<div class="tabs">
  <button class="tb on" onclick="show('cover',null,this)">Overview</button>
  <button class="tb" onclick="show('fin',null,this)">Financials</button>
  <button class="tb" onclick="show('dcf',null,this)">DCF & Valuation</button>
  <button class="tb" onclick="show('wacc',null,this)">WACC Build-Up</button>
  <button class="tb" onclick="show('scen',null,this)">Scenarios & Sensitivity</button>
  <button class="tb" onclick="show('calc',null,this)">Live DCF Calculator</button>
</div>

<!-- OVERVIEW PANEL -->
<div id="pg-cover" class="panel on">
  <!-- Your existing cover HTML goes here -->
  <canvas id="cRevenue" height="100"></canvas>
</div>

<!-- FINANCIALS PANEL -->
<div id="pg-fin" class="panel">
  <!-- Your existing financials HTML goes here -->
  <canvas id="cProfit" height="160"></canvas>
  <canvas id="cEPS" height="160"></canvas>
</div>

<!-- DCF PANEL -->
<div id="pg-dcf" class="panel">
  <!-- Your existing DCF table goes here -->
</div>

<!-- WACC PANEL -->
<div id="pg-wacc" class="panel">
  <p>WACC content here</p>
</div>

<!-- SCENARIOS PANEL -->
<div id="pg-scen" class="panel">
  <p>Scenarios content here</p>
</div>

<!-- CALCULATOR PANEL -->
<div id="pg-calc" class="panel">
  <p>Live DCF Calculator here</p>
</div>

<script>
// ─────────── Tab Switching ─────────────
function show(panel, btn){
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('on'));
  document.querySelectorAll('.nl, .tb').forEach(b => b.classList.remove('on'));
  if(panel) document.getElementById('pg-'+panel).classList.add('on');
  if(btn) btn.classList.add('on');
}

// ─────────── Chart.js Charts ───────────

// Revenue chart
const ctxRev = document.getElementById('cRevenue').getContext('2d');
new Chart(ctxRev, {
  type: 'line',
  data: {
    labels: ['2020','2021','2022','2023','2024'],
    datasets: [{
      label:'Revenue $mn',
      data:[94692,162465,246252,200949,202792],
      borderColor:'#1B4F8A',
      backgroundColor:'rgba(27,79,138,0.2)',
      tension:0.3,
      fill:true
    }]
  },
  options:{responsive:true, plugins:{legend:{display:false}}}
});

// Profit chart
const ctxProfit = document.getElementById('cProfit').getContext('2d');
new Chart(ctxProfit, {
  type:'bar',
  data:{
    labels:['2020','2021','2022','2023','2024'],
    datasets:[
      {label:'EBITDA', data:[13411,34105,56269,43555,36199], backgroundColor:'#1B4F8A'},
      {label:'Net Income', data:[-5543,15689,35465,21369,17661], backgroundColor:'#C9922A'}
    ]
  },
  options:{responsive:true, plugins:{legend:{position:'top'}}}
});

// EPS chart
const ctxEPS = document.getElementById('cEPS').getContext('2d');
new Chart(ctxEPS, {
  type:'line',
  data:{
    labels:['2020','2021','2022','2023','2024'],
    datasets:[
      {label:'EPS', data:[-2.96,8.14,18.28,11.36,9.72], borderColor:'#1B4F8A', tension:0.3},
      {label:'DPS', data:[5.16,5.31,5.68,6.04,6.52], borderColor:'#C9922A', tension:0.3}
    ]
  },
  options:{responsive:true, plugins:{legend:{position:'top'}}}
});
</script>

</body>
</html>
